# Workflow de Integração Contínua e Deploy Automático (CI/CD)
# Leniar Madeiras - GitHub Pages Deploy

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Dispara o deploy ao enviar alterações para a branch principal

permissions:
  contents: write # Requerido para publicar na branch gh-pages

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código-Fonte
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci

      - name: Compilar Aplicação (Vite)
        run: npm run build
        env:
          NODE_ENV: production
          GITHUB_PAGES: "true"

      - name: Deploy para GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Pasta gerada pelo build do Vite
          branch: gh-pages # Branch destino para hospedagem estática
          clean: true
